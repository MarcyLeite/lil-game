name: Release Publish

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'release/next' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@MarcyLeite'

      - run: npm ci
      - run: npm run build

      - name: Read version
        id: v
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub npm registry
        if: steps.v.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish

      - name: Extract release notes from CHANGELOG
        if: steps.v.outputs.skip != 'true'
        id: notes
        run: |
          NOTES=$(awk '/^#+ \[/ { count++; if (count == 2) exit } count >= 1 { print }' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.v.outputs.version }}"
          fi
          {
            echo 'notes<<RELEASE_NOTES_EOF'
            echo "$NOTES"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Tag and create GitHub release
        if: steps.v.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.v.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${{ steps.notes.outputs.notes }}"
